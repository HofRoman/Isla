name: isla
description: Eine islamische App mit Quiz, Gebet, Koran und mehr
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  animated_text_kit: ^4.2.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  audioplayers: ^6.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  confetti: ^0.7.0
  flutter_compass: ^0.8.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  hijri: ^2.0.2
  flutter_qiblah: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
