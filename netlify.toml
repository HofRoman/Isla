# Isla Flutter Web — Netlify Build Configuration
#
# Netlify build steps:
#   1. Downloads Flutter SDK (stable channel)
#   2. Enables web support
#   3. Runs pub get
#   4. Builds Flutter web app (HTML renderer for max compatibility)
#   5. Publishes build/web

[build]
  command = """
    git clone https://github.com/flutter/flutter.git \
      --depth 1 \
      --branch stable \
      flutter-sdk && \
    export PATH="$PATH:$PWD/flutter-sdk/bin" && \
    flutter config --enable-web && \
    flutter pub get && \
    flutter build web \
      --release \
      --web-renderer html \
      --dart-define=FLUTTER_WEB_USE_SKIA=false
  """
  publish = "build/web"

[build.environment]
  # Suppress Flutter analytics & update checks during CI
  FLUTTER_SUPPRESS_ANALYTICS = "true"
  CI = "true"

# SPA routing: all paths → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"

# Cache Flutter build artifacts
[[headers]]
  for = "/flutter.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.dart.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
